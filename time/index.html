<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>디지털 시계</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="clock-container">

        <!-- 오른쪽 상단 버튼 영역 -->
        <div class="top-button">
            <button id="toggleFormat">
                <img src="clock.png">
            </button>
        </div>

        <!-- 날짜 -->
        <div id="date"></div>

        <!-- 시간 -->
        <div id="time"></div>

        <!-- 메시지 -->
        <div class="message-box">
            <div id="message"></div>
        </div>

    </div>

    <script src="./script.js"></script>
</body>
</html>
